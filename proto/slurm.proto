syntax = "proto3";

package slurm;

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";

// ============================================================
// Core Types
// ============================================================

message ResourceSet {
  uint32 cpus = 1;
  uint64 memory_mb = 2;
  repeated GpuResource gpus = 3;
  map<string, uint64> generic = 4;  // licenses, etc.
}

message AllocatedDevice {
  uint32 device_id = 1;
  uint64 count = 2;
}

message DeviceAllocations {
  repeated AllocatedDevice devices = 1;
}

message ResourceAllocations {
  uint32 cpus = 1;
  uint64 memory_mb = 2;
  map<string, DeviceAllocations> devices = 3;
}

message GpuResource {
  uint32 device_id = 1;
  string gpu_type = 2;       // "mi300x", "h100"
  uint64 memory_mb = 3;
  repeated uint32 peer_gpus = 4;
  GpuLinkType link_type = 5;
}

enum GpuLinkType {
  GPU_LINK_PCIE = 0;
  GPU_LINK_XGMI = 1;
  GPU_LINK_NVLINK = 2;
}

enum JobState {
  JOB_PENDING = 0;
  JOB_RUNNING = 1;
  JOB_COMPLETING = 2;
  JOB_COMPLETED = 3;
  JOB_FAILED = 4;
  JOB_CANCELLED = 5;
  JOB_TIMEOUT = 6;
  JOB_NODE_FAIL = 7;
  JOB_PREEMPTED = 8;
  JOB_SUSPENDED = 9;
  JOB_DEADLINE = 10;
  JOB_OUT_OF_MEMORY = 11;
}

enum NodeState {
  NODE_IDLE = 0;
  NODE_ALLOCATED = 1;
  NODE_MIXED = 2;
  NODE_DOWN = 3;
  NODE_DRAIN = 4;
  NODE_DRAINING = 5;
  NODE_ERROR = 6;
  NODE_UNKNOWN = 7;
  NODE_SUSPENDED = 8;
}

// A GPU resource request. `count` is interpreted per the field it populates
// on JobSpec: `gpus` = total across the job, `gpus_per_node` = per node,
// `gpus_per_task` = per task. `gpu_type` is optional (e.g. "mi300x").
message GpuRequest {
  uint32 count = 1;
  string gpu_type = 2;
}

message JobSpec {
  string name = 1;
  string partition = 2;
  string account = 3;
  string user = 4;
  uint32 uid = 5;
  uint32 gid = 6;

  // Resources
  uint32 num_nodes = 10;
  uint32 num_tasks = 11;
  uint32 tasks_per_node = 12;
  uint32 cpus_per_task = 13;
  uint64 memory_per_node_mb = 14;
  uint64 memory_per_cpu_mb = 15;
  repeated string gres = 16;  // "gpu:mi300x:4"

  // GPU requests (mutually exclusive; at most one may be set). Distinct from
  // `gres` so the controller can tell "total across the job" (`gpus`) apart
  // from per-node/per-task counts. `--gres=gpu:N` continues to arrive via
  // `gres` and is normalized to `gpus_per_node` by the controller.
  GpuRequest gpus = 17;           // --gpus / -G: total across the whole job
  GpuRequest gpus_per_node = 18;  // --gpus-per-node
  GpuRequest gpus_per_task = 19;  // --gpus-per-task

  // Execution
  string script = 20;
  repeated string argv = 21;
  string work_dir = 22;
  string stdout_path = 23;
  string stderr_path = 24;
  map<string, string> environment = 25;
  string stdin_path = 26;

  // Time limits
  google.protobuf.Duration time_limit = 30;
  google.protobuf.Duration time_min = 31;

  // Scheduling hints
  string qos = 40;
  uint32 priority = 41;
  string reservation = 42;
  repeated string dependency = 43;  // "afterok:123,afterany:456"
  string nodelist = 44;             // "node[001-010]"
  string exclude = 45;
  string constraint = 46;       // "mi300x,nvlink" - required node features
  repeated string licenses = 47;  // "fluent:5", "matlab:1"

  // Notifications
  repeated string mail_type = 48;  // "BEGIN", "END", "FAIL", "ALL"
  string mail_user = 49;

  // Array
  string array_spec = 50;  // "0-99%10"

  // MPI
  string mpi = 51;            // MPI type: "none", "pmix", "pmi2"
  string distribution = 52;   // Task distribution: "block", "cyclic", "plane"
  uint32 het_group = 53;      // Heterogeneous job component index
  string burst_buffer = 54;   // Burst buffer directives ("stage_in:cmd;stage_out:cmd")
  google.protobuf.Timestamp begin_time = 55;   // Earliest eligible start time
  google.protobuf.Timestamp deadline = 56;     // Cancel if still pending after this
  bool spread_job = 57;                        // Spread across least-loaded nodes
  string open_mode = 58;                       // "truncate" or "append"
  string topology = 59;                        // Topology preference: "tree", "block", or empty

  // Misc
  bool requeue = 60;
  bool exclusive = 61;
  bool hold = 62;
  string comment = 63;
  string wckey = 64;
  bool interactive = 65;  // salloc interactive allocation

  // Kubernetes pod options
  bool host_network = 66;          // Enable host networking (RDMA/NCCL)
  bool privileged = 67;            // Run in privileged mode
  bool host_ipc = 68;              // Share host IPC namespace
  string shm_size = 69;            // Shared memory size (e.g., "64Gi")
  map<string, string> extra_resources = 80; // Custom device plugin resources
  repeated string script_args = 81;          // Positional args for the batch script ($1, $2, ...)

  // Container
  string container_image = 70;     // OCI image ref or squashfs path
  repeated string container_mounts = 71;  // "/src:/dst:ro" bind mounts
  string container_workdir = 72;   // Workdir inside container
  string container_name = 73;      // Named container (persists across jobs)
  bool container_readonly = 74;    // Read-only rootfs
  bool container_mount_home = 75;  // Bind-mount user home directory
  map<string, string> container_env = 76; // Extra env vars for container
  string container_entrypoint = 77; // Override entrypoint
  bool container_remap_root = 78;  // Remap user to root inside container

  // Standalone srun: reserve an allocation without launching a batch script;
  // the user command runs as a job step after nodes are registered.
  bool srun_job = 82;

  // Interactive PTY session (srun --pty)
  bool pty = 83;
  WindowSize initial_winsize = 84;
}

message JobInfo {
  uint32 job_id = 1;
  string name = 2;
  string user = 3;
  uint32 uid = 4;
  string partition = 5;
  string account = 6;
  JobState state = 7;
  string state_reason = 8;

  google.protobuf.Timestamp submit_time = 10;
  google.protobuf.Timestamp start_time = 11;
  google.protobuf.Timestamp end_time = 12;
  google.protobuf.Duration time_limit = 13;
  google.protobuf.Duration run_time = 14;

  uint32 num_nodes = 20;
  uint32 num_tasks = 21;
  uint32 cpus_per_task = 22;
  string nodelist = 23;
  string work_dir = 24;
  string command = 25;

  int32 exit_code = 30;
  string stdout_path = 31;
  string stderr_path = 32;
  int32 exit_signal = 33;       // Terminating signal of primary node (0 = none)
  int32 derived_exit_code = 34; // Running max over srun step exit codes (0 if no steps)
  string stdin_path = 35;

  ResourceAllocations resources = 40;
  uint32 priority = 41;
  string qos = 42;

  // Array jobs
  uint32 array_job_id = 50;
  uint32 array_task_id = 51;

  // Reservation
  string reservation = 52;

  string comment = 53;

  // True when standalone srun uses native step dispatch (not K8s batch fallback).
  // Requires a matching spur CLI: clients that ignore this field against a
  // step-dispatch controller will poll for batch completion while agents hold
  // allocation-only state.
  bool srun_step_dispatch = 54;

  // Requested GPUs (observability). `req_gpus` is the job total; `req_gpus_detail`
  // is a human summary such as "gpu:8" (total), "gpu:mi300x:4/node", or
  // "gpu:2/task".
  uint32 req_gpus = 55;
  string req_gpus_detail = 56;
}

message NodeInfo {
  string name = 1;
  NodeState state = 2;
  string state_reason = 3;
  repeated string partitions = 4;

  ResourceSet total_resources = 10;
  ResourceAllocations alloc_resources = 11;

  string arch = 20;
  string os = 21;
  uint32 cpu_load = 22;    // load * 100
  uint64 free_memory_mb = 23;

  google.protobuf.Timestamp boot_time = 30;
  google.protobuf.Timestamp last_busy = 31;
  google.protobuf.Timestamp slurmd_start_time = 32;

  string switch_name = 40;   // Leaf switch from topology config

  string active_reservation = 50;
  map<string, string> labels = 51;
  bool reservation_maint = 52;
  repeated string features = 53;
}

message PartitionInfo {
  string name = 1;
  string state = 2;          // UP, DOWN, DRAIN, INACTIVE
  bool is_default = 3;

  uint32 total_nodes = 10;
  uint32 total_cpus = 11;
  string nodes = 12;         // hostlist

  google.protobuf.Duration max_time = 20;
  google.protobuf.Duration default_time = 21;
  uint32 max_nodes = 22;
  uint32 min_nodes = 23;

  bool allow_root = 30;
  bool exclusive_user = 31;
  string allow_accounts = 32;
  string allow_groups = 33;
  string allow_qos = 34;
  string deny_accounts = 42;

  string preempt_mode = 40;
  uint32 priority_tier = 41;
}

// ============================================================
// Services
// ============================================================

// -- Controller service (slurmctld) --

service SlurmController {
  // Job management
  rpc SubmitJob(SubmitJobRequest) returns (SubmitJobResponse);
  rpc GetJobs(GetJobsRequest) returns (GetJobsResponse);
  rpc GetJob(GetJobRequest) returns (JobInfo);
  rpc CancelJob(CancelJobRequest) returns (google.protobuf.Empty);
  // Finish a standalone srun allocation after its step completes.
  rpc CompleteJob(CompleteJobRequest) returns (google.protobuf.Empty);
  rpc SuspendJob(SuspendJobRequest) returns (google.protobuf.Empty);
  rpc ResumeJob(ResumeJobRequest) returns (google.protobuf.Empty);
  rpc UpdateJob(UpdateJobRequest) returns (google.protobuf.Empty);

  // Node management
  rpc GetNodes(GetNodesRequest) returns (GetNodesResponse);
  rpc GetNode(GetNodeRequest) returns (NodeInfo);
  rpc UpdateNode(UpdateNodeRequest) returns (google.protobuf.Empty);
  rpc DrainNode(DrainNodeRequest) returns (DrainNodeResponse);
  rpc DeregisterNode(DeregisterNodeRequest) returns (DeregisterNodeResponse);

  // Agent deregistration (called by spurd on SIGTERM)
  rpc DeregisterAgent(DeregisterAgentRequest) returns (google.protobuf.Empty);

  // Partition management
  rpc GetPartitions(GetPartitionsRequest) returns (GetPartitionsResponse);

  // Job steps
  rpc GetJobSteps(GetJobStepsRequest) returns (GetJobStepsResponse);
  rpc CreateJobStep(CreateJobStepRequest) returns (CreateJobStepResponse);

  // Health
  rpc Ping(google.protobuf.Empty) returns (PingResponse);

  // Cluster metrics snapshots
  rpc GetJobMetrics(google.protobuf.Empty) returns (JobMetrics);
  rpc GetNodeMetrics(google.protobuf.Empty) returns (NodeMetrics);

  // Controller RPC handler statistics (since process start or last reset)
  rpc GetRpcStats(google.protobuf.Empty) returns (RpcStats);
  rpc ResetDiagStats(google.protobuf.Empty) returns (google.protobuf.Empty);

  // Scheduler cycle and lifecycle statistics (since process start or last reset)
  rpc GetSchedStats(google.protobuf.Empty) returns (SchedStats);

  // Agent registration
  rpc RegisterAgent(RegisterAgentRequest) returns (RegisterAgentResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // Admission token management
  rpc CreateToken(CreateTokenRequest) returns (CreateTokenResponse);
  rpc ListTokens(ListTokensRequest) returns (ListTokensResponse);
  rpc RevokeToken(RevokeTokenRequest) returns (RevokeTokenResponse);

  // K8s operator callback: report job completion from Pod watcher
  rpc ReportJobStatus(ReportJobStatusRequest) returns (google.protobuf.Empty);

  // Reservation management
  rpc CreateReservation(CreateReservationRequest) returns (google.protobuf.Empty);
  rpc UpdateReservation(UpdateReservationRequest) returns (google.protobuf.Empty);
  rpc DeleteReservation(DeleteReservationRequest) returns (google.protobuf.Empty);
  rpc ListReservations(ListReservationsRequest) returns (ListReservationsResponse);

  // Exec a command inside a running job's container (proxies to correct agent)
  rpc ExecInJob(ExecInJobRequest) returns (ExecInJobResponse);

  // Run a step across an allocation's nodes — used by srun inside sbatch/salloc
  // and standalone srun. Fans out tasks via agent RunCommand RPCs.
  rpc RunStep(RunStepRequest) returns (RunStepResponse);

  // -- Native cluster (k0s) lifecycle: SPUR owns the k0s cluster --
  rpc ClusterUp(ClusterUpRequest) returns (ClusterUpResponse);
  rpc ClusterDown(ClusterDownRequest) returns (ClusterDownResponse);
  rpc ClusterStatus(ClusterStatusRequest) returns (ClusterStatusResponse);
  rpc ClusterKubeconfig(ClusterKubeconfigRequest) returns (ClusterKubeconfigResponse);
}

// -- Agent service (slurmd) --

service SlurmAgent {
  rpc LaunchJob(LaunchJobRequest) returns (LaunchJobResponse);
  rpc CancelJob(AgentCancelJobRequest) returns (google.protobuf.Empty);
  rpc SuspendJob(AgentSuspendJobRequest) returns (google.protobuf.Empty);
  rpc GetNodeResources(google.protobuf.Empty) returns (NodeResourcesResponse);
  rpc ExecInJob(ExecInJobRequest) returns (ExecInJobResponse);
  // Run a one-shot command on this node (for srun step dispatch).
  rpc RunCommand(RunCommandRequest) returns (RunCommandResponse);
  // Record an allocation on this node without launching a batch process.
  rpc RegisterJobAllocation(RegisterJobAllocationRequest) returns (RegisterJobAllocationResponse);
  rpc StreamJobOutput(StreamJobOutputRequest) returns (stream StreamJobOutputChunk);
  // PTY-backed interactive session (srun --pty, sattach, srun --overlap --pty)
  rpc InteractiveSession(stream InteractiveInput) returns (stream InteractiveOutput);

  // -- Native cluster component control: the controller drives each node's
  //    spurd-owned k0s systemd unit through these. --
  rpc StartClusterComponent(StartClusterComponentRequest) returns (StartClusterComponentResponse);
  rpc StopClusterComponent(StopClusterComponentRequest) returns (StopClusterComponentResponse);
  rpc GetClusterComponentStatus(GetClusterComponentStatusRequest) returns (GetClusterComponentStatusResponse);

  // -- Control-plane-only cluster admin: the controller calls these on
  //    the control-plane node's agent, which shells `k0s` against the running
  //    controller. Worker joins need a fresh token; ClusterKubeconfig needs the
  //    admin kubeconfig. Erroring on a non-control-plane node is expected. --
  rpc CreateK0sJoinToken(CreateK0sJoinTokenRequest) returns (CreateK0sJoinTokenResponse);
  rpc GetAdminKubeconfig(GetAdminKubeconfigRequest) returns (GetAdminKubeconfigResponse);

  // Apply the full-mesh WireGuard membership on this node: the controller pushes the
  // authoritative peer set so a native-routing CNI (Calico bird) can ride the mesh. Additive +
  // idempotent — safe to re-push.
  rpc ApplyMesh(MeshMembership) returns (ApplyMeshResponse);
}

// -- Accounting service --

service SlurmAccounting {
  rpc RecordJobStart(RecordJobStartRequest) returns (google.protobuf.Empty);
  rpc RecordJobEnd(RecordJobEndRequest) returns (google.protobuf.Empty);
  rpc GetJobHistory(GetJobHistoryRequest) returns (GetJobHistoryResponse);
  rpc GetUsage(GetUsageRequest) returns (GetUsageResponse);

  // Account management (sacctmgr)
  rpc CreateAccount(CreateAccountRequest) returns (google.protobuf.Empty);
  rpc DeleteAccount(DeleteAccountRequest) returns (google.protobuf.Empty);
  rpc ListAccounts(ListAccountsRequest) returns (ListAccountsResponse);

  // User management (sacctmgr)
  rpc AddUser(AddUserRequest) returns (google.protobuf.Empty);
  rpc RemoveUser(RemoveUserRequest) returns (google.protobuf.Empty);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);

  // QOS management (sacctmgr)
  rpc CreateQos(CreateQosRequest) returns (google.protobuf.Empty);
  rpc DeleteQos(DeleteQosRequest) returns (google.protobuf.Empty);
  rpc ListQos(ListQosRequest) returns (ListQosResponse);

  // Fairshare
  rpc GetFairshareFactors(GetFairshareFactorsRequest) returns (GetFairshareFactorsResponse);
}

// ============================================================
// Request/Response Messages
// ============================================================

// -- Controller --

message SubmitJobRequest {
  JobSpec spec = 1;
}

message SubmitJobResponse {
  uint32 job_id = 1;
}

message GetJobsRequest {
  repeated JobState states = 1;
  string user = 2;
  string partition = 3;
  string account = 4;
  repeated uint32 job_ids = 5;
  string name = 6;
}

message GetJobsResponse {
  repeated JobInfo jobs = 1;
}

message GetJobRequest {
  uint32 job_id = 1;
}

message CancelJobRequest {
  uint32 job_id = 1;
  int32 signal = 2;  // 0 = cancel, else signal number
  string user = 3;   // For authorization
}

message CompleteJobRequest {
  uint32 job_id = 1;
  int32 exit_code = 2;
  string user = 3;   // For authorization
}

message SuspendJobRequest {
  uint32 job_id = 1;
  string user = 2;   // For authorization (owner or root required).
}

message ResumeJobRequest {
  uint32 job_id = 1;
  string user = 2;   // For authorization (owner or root required).
}

message UpdateJobRequest {
  uint32 job_id = 1;
  optional string partition = 2;
  optional string account = 3;
  optional uint32 priority = 4;
  optional google.protobuf.Duration time_limit = 5;
  optional bool hold = 6;
  optional string comment = 7;
  optional string qos = 8;
}

message GetNodesRequest {
  repeated NodeState states = 1;
  string partition = 2;
  string nodelist = 3;  // hostlist pattern
}

message GetNodesResponse {
  repeated NodeInfo nodes = 1;
}

message GetNodeRequest {
  string name = 1;
}

message UpdateNodeRequest {
  string name = 1;
  optional NodeState state = 2;
  optional string reason = 3;
  map<string, string> labels = 4;
  repeated string remove_labels = 5;
}

message DrainNodeRequest {
  string name = 1;
  string reason = 2;
}

message DrainNodeResponse {
  string actual_state = 1;
  uint32 running_jobs = 2;
}

message DeregisterNodeRequest {
  string name = 1;
  bool force = 2;
  string reason = 3;
}

message DeregisterNodeResponse {
  uint32 evicted_jobs_count = 1;
}

message DeregisterAgentRequest {
  string hostname = 1;
  string node_token = 2;
  string reason = 3;
}

message GetPartitionsRequest {
  string name = 1;  // empty = all
}

message GetPartitionsResponse {
  repeated PartitionInfo partitions = 1;
}

message PingResponse {
  string hostname = 1;
  google.protobuf.Timestamp server_time = 2;
  string version = 3;
  repeated string federation_peers = 4;
}

message JobStateCount {
  JobState state = 1;
  uint64 count = 2;
}

message JobMetrics {
  uint64 total = 1;
  repeated JobStateCount by_state = 2;
  uint64 held_pending = 3;
  uint64 running_cpus = 4;
  uint64 running_memory_bytes = 5;
  uint64 running_gpus = 6;
}

message NodeStateCount {
  NodeState state = 1;
  uint64 count = 2;
}

message NodeMetricsEntry {
  string name = 1;
  uint64 total_cpus = 2;
  uint64 alloc_cpus = 3;
  uint64 total_memory_bytes = 4;
  uint64 alloc_memory_bytes = 5;
  uint64 total_gpus = 6;
  uint64 alloc_gpus = 7;
  uint64 cpu_load = 8;
  uint64 free_memory_bytes = 9;
}

message NodeMetrics {
  uint64 total = 1;
  repeated NodeStateCount by_state = 2;
  uint64 total_cpus = 3;
  uint64 alloc_cpus = 4;
  uint64 total_memory_bytes = 5;
  uint64 alloc_memory_bytes = 6;
  uint64 total_gpus = 7;
  uint64 alloc_gpus = 8;
  repeated NodeMetricsEntry per_node = 9;
}

message RpcOperationStats {
  string operation = 1;
  uint64 count = 2;
  uint64 total_time_us = 3;
  uint64 avg_time_us = 4;
}

message RpcStats {
  repeated RpcOperationStats by_operation = 1;
}

message SchedStats {
  string plugin = 1;
  uint64 cycles = 2;
  uint64 cycle_total_time_us = 3;
  uint64 cycle_last_time_us = 4;
  uint64 cycle_avg_time_us = 5;
  uint64 schedule_total_time_us = 6;
  uint64 schedule_last_time_us = 7;
  uint64 schedule_avg_time_us = 8;
  uint64 jobs_submitted = 9;
  uint64 jobs_started = 10;
  uint64 jobs_finalized = 11;
  uint64 jobs_started_last_cycle = 12;
  uint64 exit_end = 13;
  uint64 exit_max_depth = 14;
}

message RegisterAgentRequest {
  string hostname = 1;
  ResourceSet resources = 2;
  string version = 3;
  string address = 4;        // Agent's preferred IP (e.g. WireGuard 10.44.x.y)
  uint32 port = 5;           // Agent gRPC listen port
  string wg_pubkey = 6;      // WireGuard public key (for mesh setup)
  map<string, string> labels = 7;  // Node labels for partition routing (pool, rack, etc.)
  string join_token = 8;     // Admission token for token-based admission
}

message RegisterAgentResponse {
  bool accepted = 1;
  string message = 2;
  string node_token = 3;
}

message HeartbeatRequest {
  string hostname = 1;
  uint32 cpu_load = 2;
  uint64 free_memory_mb = 3;
  repeated RunningJobStatus running_jobs = 4;
  string node_token = 5;
  // This node's current WireGuard mesh public key. Re-sent every heartbeat so the controller
  // learns a key that appears/changes after registration (late mesh, spur0 recreated) and can
  // include the node in ApplyMesh without a spurd restart. Empty when the node has no mesh key.
  string wg_pubkey = 6;
}

message RunningJobStatus {
  uint32 job_id = 1;
  JobState state = 2;
  int32 exit_code = 3;
}

message HeartbeatResponse {}

// -- Agent --

message LaunchJobRequest {
  uint32 job_id = 1;
  JobSpec spec = 2;
  ResourceAllocations allocated = 3;
  repeated string peer_nodes = 4;  // All nodes in this job's allocation
  uint32 task_offset = 5;          // This node's starting task index
  string target_node = 6;          // Which K8s/Spur node this dispatch targets
  // Per-task array identity, controller-assigned at expansion (not user-supplied).
  // array_job_id is the parent id (0 = not an array task); exported as SLURM_ARRAY_*.
  uint32 array_job_id = 7;
  uint32 array_task_id = 8;
  // Run epoch for this dispatch; agent echoes it in ReportJobStatusRequest so
  // the controller can drop stale-run reports. 0 = unset (legacy), check off.
  uint32 run_attempt = 9;
}

message LaunchJobResponse {
  bool success = 1;
  string error = 2;
  string stdout_path = 3;  // absolute resolved output path on the launching node
  string stderr_path = 4;
}

message AgentCancelJobRequest {
  uint32 job_id = 1;
  int32 signal = 2;
}

message AgentSuspendJobRequest {
  uint32 job_id = 1;
  bool resume = 2;   // false = SIGSTOP (suspend), true = SIGCONT (resume)
}

message NodeResourcesResponse {
  ResourceSet total = 1;
  ResourceAllocations used = 2;
}

message ExecInJobRequest {
  uint32 job_id = 1;
  repeated string command = 2;  // Command to exec inside the container
}

message ExecInJobResponse {
  bool success = 1;
  int32 exit_code = 2;
  string stdout = 3;
  string stderr = 4;
}

// Controller-side request: run a step inside an allocation. The controller
// fans out tasks across the allocation's nodes via each agent's RunCommand
// RPC. Used by srun inside sbatch/salloc and standalone srun.
message RunStepRequest {
  uint32 job_id = 1;
  repeated string command = 2;
  uint32 uid = 3;
  uint32 gid = 4;
  string work_dir = 5;
  map<string, string> environment = 6;
  uint32 step_id = 7;  // Step id from CreateJobStep, for recording completion
  bool label = 8;      // Prefix output lines with [rank] (srun -l)
}

message RunStepResponse {
  int32 exit_code = 1;   // Max exit code across all tasks in the step
  string stdout = 2;     // Aggregated stdout from all tasks/nodes
  string stderr = 3;     // Aggregated stderr from all tasks/nodes
  string node = 4;       // Comma-separated hostnames that ran tasks
}

// -- Native cluster (k0s) lifecycle messages --

message ClusterUpRequest {
  // Override the control-plane node; empty = pick from [cluster] config / inventory.
  optional string control_plane_node = 1;
  reserved 2; // was install_arc — ARC is not installed by spur/k0s
}
message ClusterUpResponse {
  bool accepted = 1;
  string message = 2;
  repeated ClusterNodeStatus nodes = 3;
}

message ClusterDownRequest {
  // Also `k0s reset` each node (destructive: wipes cluster state).
  bool reset = 1;
}
message ClusterDownResponse {
  bool accepted = 1;
  string message = 2;
}

message ClusterStatusRequest {}
message ClusterStatusResponse {
  // "down" | "provisioning" | "ready" | "degraded"
  string phase = 1;
  string control_plane_node = 2;
  repeated ClusterNodeStatus nodes = 3;
}

message ClusterNodeStatus {
  string node = 1;
  string role = 2;             // "controller" | "worker" | "single"
  string component_state = 3;  // systemd active-state: "active" | "inactive" | "failed" | "unknown"
  bool enabled = 4;
}

message ClusterKubeconfigRequest {}
message ClusterKubeconfigResponse {
  // Admin kubeconfig YAML (server rewritten to the control-plane's mesh IP).
  string kubeconfig = 1;
}

// -- Agent-side cluster component control messages --

message StartClusterComponentRequest {
  string role = 1;             // "controller" | "worker" | "single"
  // k0s join token (bearer secret — never log). Empty for single / first controller.
  optional string join_token = 2;
  // Rendered k0s config YAML. Empty = agent uses role defaults.
  optional string k0s_config = 3;
  // Worker kubelet --node-ip (its mesh IP) for native-routing CNIs. Empty = k0s picks the default.
  optional string node_ip = 4;
}
message StartClusterComponentResponse {
  bool started = 1;
  string component_state = 2;  // systemd active-state after the action
  string message = 3;
}

message StopClusterComponentRequest {
  bool reset = 1;              // also `k0s reset` (destructive)
}
message StopClusterComponentResponse {
  bool stopped = 1;
  string message = 2;
}

message GetClusterComponentStatusRequest {}
message GetClusterComponentStatusResponse {
  string role = 1;
  string component_state = 2;  // "active" | "inactive" | "failed" | "unknown"
  bool enabled = 3;
}

// -- Control-plane-only cluster admin messages --

message CreateK0sJoinTokenRequest {
  string role = 1;             // "worker" | "controller"
  uint64 expiry_seconds = 2;   // token lifetime; 0 = k0s default
}
message CreateK0sJoinTokenResponse {
  // k0s join token (bearer secret — never log).
  string join_token = 1;
}

message GetAdminKubeconfigRequest {}
message GetAdminKubeconfigResponse {
  // Admin kubeconfig YAML read from the control-plane node.
  string kubeconfig = 1;
}

// -- Full-mesh membership: proto mirror of spur_net::mesh::MeshNode/MeshMembership --

message MeshNode {
  string hostname = 1;     // node name (used to resolve self + the agent endpoint)
  string public_key = 2;   // WireGuard public key
  string mesh_ip = 3;      // mesh address on spur0 (no prefix), e.g. 10.44.0.2
  string endpoint = 4;     // underlay endpoint, e.g. 198.51.100.2:51820
  optional string pod_cidr = 5; // node's pod /24 for native-routing CNIs
}
message MeshMembership {
  repeated MeshNode nodes = 1;
}
message ApplyMeshResponse {
  bool applied = 1;
  uint32 peers = 2;        // number of peers applied (self excluded)
  string message = 3;
}

// Agent-side request: run a command directly on this node (no namespace
// entry, since salloc allocations don't track a job process). The agent
// runs the command as the requested uid/gid in the requested work_dir.
message RunCommandRequest {
  repeated string command = 1;
  uint32 uid = 2;
  uint32 gid = 3;
  string work_dir = 4;
  map<string, string> environment = 5;
  uint32 job_id = 6;
  uint32 num_tasks = 7;        // Tasks to launch on this node (default 1)
  uint32 task_offset = 8;      // Global rank of the first local task
  uint32 step_id = 9;
  uint32 step_num_tasks = 10;  // Total tasks in the step (SLURM_NTASKS)
  bool label = 11;             // Prefix output with [rank] inside wrapper
}

// Register a srun-only allocation on an agent without starting a batch process.
message RegisterJobAllocationRequest {
  uint32 job_id = 1;
  string partition = 2;
  string nodelist = 3;
  uint32 uid = 4;
  uint32 gid = 5;
  uint32 cpus = 6;
  uint64 memory_mb = 7;
  repeated string gpu_devices = 8;
  ResourceAllocations allocated = 9;
  string mpi = 10;
  string work_dir = 11;
}

message RegisterJobAllocationResponse {}

message RunCommandResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
}

message StreamJobOutputRequest {
  uint32 job_id = 1;
  string stream = 2;  // "stdout" or "stderr"
}

message StreamJobOutputChunk {
  bytes data = 1;
  bool eof = 2;
}

// -- Interactive PTY session (srun --pty, sattach, srun --overlap --pty) --

message WindowSize {
  uint32 rows = 1;
  uint32 cols = 2;
  uint32 xpixel = 3;
  uint32 ypixel = 4;
}

message InitSession {
  uint32 job_id = 1;
  uint32 step_id = 2;        // 0 = primary job session
  bool overlap = 3;          // Enter running job's namespaces (--overlap)
  bool pty = 4;              // Always true for now
  WindowSize winsize = 5;    // Initial terminal dimensions
  repeated string argv = 6;  // Command to run (empty = default shell)
  map<string, string> env = 7;
}

message InteractiveInput {
  oneof msg {
    InitSession init = 1;    // First message: session setup
    bytes stdin = 2;         // Raw stdin bytes
    WindowSize resize = 3;   // Terminal resize (SIGWINCH)
    int32 signal = 4;        // Out-of-band signal to foreground pgrp
  }
}

message InteractiveOutput {
  oneof msg {
    bytes data = 1;          // PTY master output (stdout+stderr merged)
    int32 exit_status = 2;   // Final exit code; terminates the stream
  }
}

// -- Accounting --

message RecordJobStartRequest {
  uint32 job_id = 1;
  string user = 2;
  string account = 3;
  string partition = 4;
  ResourceAllocations resources = 5;
  google.protobuf.Timestamp start_time = 6;
  string reservation = 7;
  string name = 8;
  google.protobuf.Timestamp submit_time = 9;
}

message RecordJobEndRequest {
  uint32 job_id = 1;
  JobState final_state = 2;
  int32 exit_code = 3;
  google.protobuf.Timestamp end_time = 4;
  int32 exit_signal = 5;        // Terminating signal of primary node (0 = none)
  int32 derived_exit_code = 6;  // Running max over srun step exit codes (0 if no steps)
}

message GetJobHistoryRequest {
  string user = 1;
  string account = 2;
  google.protobuf.Timestamp start_after = 3;
  google.protobuf.Timestamp start_before = 4;
  repeated JobState states = 5;
  uint32 limit = 6;
}

message GetJobHistoryResponse {
  repeated JobInfo jobs = 1;
}

message GetUsageRequest {
  string user = 1;
  string account = 2;
  google.protobuf.Timestamp since = 3;
}

message UsageEntry {
  string user = 1;
  string account = 2;
  double cpu_hours = 3;
  double gpu_hours = 4;
  uint64 job_count = 5;
}

message GetUsageResponse {
  repeated UsageEntry entries = 1;
}

message GetFairshareFactorsRequest {
  uint32 halflife_days = 1;
}

message FairshareEntry {
  string user = 1;
  string account = 2;
  double factor = 3;
}

message GetFairshareFactorsResponse {
  repeated FairshareEntry entries = 1;
}

// -- K8s Operator --

message ReportJobStatusRequest {
  uint32 job_id = 1;
  // Completion gate for per-node reports. Must be JOB_COMPLETED when
  // exit_code==0, or JOB_FAILED when exit_code!=0.
  //
  // spurctld aggregates all per-node exit codes via derived_completion and
  // computes the final job state from those codes. This field does not set the
  // final job state by itself. Other terminal states (CANCELLED, TIMEOUT,
  // NODE_FAIL) are invalid on this RPC.
  JobState state = 2;
  int32 exit_code = 3;
  string message = 4;  // Pod status message or error
  bool drain_node = 5;     // Agent requests its node be drained (e.g. prolog/epilog failure)
  string drain_reason = 6; // Reason for drain request
  string reporting_node = 7; // Hostname of the reporting agent (for drain targeting)
  int32 signal = 8;  // Terminating signal of the reporting node's process (0 = none)
  // Echoed from LaunchJobRequest.run_attempt; controller drops this report if
  // older than the job's current epoch. 0 = unset (legacy), check off.
  uint32 run_attempt = 9;
}

// ============================================================
// Account/User/QOS Management (sacctmgr)
// ============================================================

message CreateAccountRequest {
  string name = 1;
  string description = 2;
  string organization = 3;
  string parent_account = 4;
  double fairshare_weight = 5;
  uint32 max_running_jobs = 6;
  string grp_tres = 7;
}

message DeleteAccountRequest {
  string name = 1;
}

message ListAccountsRequest { }

message ListAccountsResponse {
  repeated AccountInfo accounts = 1;
}

message AccountInfo {
  string name = 1;
  string description = 2;
  string organization = 3;
  string parent_account = 4;
  double fairshare_weight = 5;
  uint32 max_running_jobs = 6;
  string grp_tres = 7;
}

message AddUserRequest {
  string user = 1;
  string account = 2;
  string admin_level = 3;
  bool is_default = 4;
  // Default QOS for this user's association with `account`. Like every
  // other field here, this is a full resend on upsert, not a partial
  // patch: empty clears an existing default (matches modify account/qos).
  string default_qos = 5;
  // Association-level resource limits for `user` within `account`. Same
  // full-resend semantics as default_qos: 0/empty clears an existing
  // limit rather than leaving it unchanged.
  uint32 max_running_jobs = 6;
  uint32 max_submit_jobs = 7;
  string max_tres_per_job = 8;
  string grp_tres = 9;
  uint32 max_wall_minutes = 10;
  // Comma-separated QOS names this association may use. Same full-resend
  // semantics: empty clears an existing allow-list back to unrestricted.
  // default_qos must be a member when both are set.
  string allowed_qos = 11;
}

message RemoveUserRequest {
  string user = 1;
  string account = 2;
}

message ListUsersRequest {
  string account = 1;
  string user = 2;
}

message ListUsersResponse {
  repeated UserInfo users = 1;
}

message UserInfo {
  string name = 1;
  string account = 2;
  string admin_level = 3;
  string default_account = 4;
  string default_qos = 5;
  string allowed_qos = 6;
}

message CreateQosRequest {
  string name = 1;
  string description = 2;
  int32 priority = 3;
  string preempt_mode = 4;
  double usage_factor = 5;
  uint32 max_jobs_per_user = 6;
  uint32 max_wall_minutes = 7;
  string max_tres_per_job = 8;
  uint32 max_submit_jobs_per_user = 9;
  string max_tres_per_user = 10;
  string grp_tres = 11;
  uint32 grp_wall_minutes = 12;
}

message DeleteQosRequest {
  string name = 1;
}

message ListQosRequest { }

message ListQosResponse {
  repeated QosInfo qos_list = 1;
}

message QosInfo {
  string name = 1;
  string description = 2;
  int32 priority = 3;
  string preempt_mode = 4;
  double usage_factor = 5;
  uint32 max_jobs_per_user = 6;
  uint32 max_wall_minutes = 7;
  string max_tres_per_job = 8;
  uint32 max_submit_jobs_per_user = 9;
  string max_tres_per_user = 10;
  string grp_tres = 11;
  uint32 grp_wall_minutes = 12;
}

// ============================================================
// Job Steps
// ============================================================

message JobStepInfo {
  uint32 job_id = 1;
  uint32 step_id = 2;
  string name = 3;
  string state = 4;
  uint32 num_tasks = 5;
}

message GetJobStepsRequest {
  uint32 job_id = 1;
}

message GetJobStepsResponse {
  repeated JobStepInfo steps = 1;
}

message CreateJobStepRequest {
  uint32 job_id = 1;
  repeated string command = 2;
  uint32 num_tasks = 3;
  uint32 cpus_per_task = 4;
  bool overlap = 5;           // Share resources with existing step (--overlap)
  bool pty = 6;               // Allocate a PTY for the step
  WindowSize winsize = 7;     // Initial terminal dimensions
}

message CreateJobStepResponse {
  uint32 step_id = 1;
  string node_addr = 2;        // Address of the first allocated node (host:port for agent)
}

// ============================================================
// Reservation Management
// ============================================================

message CreateReservationRequest {
  string name = 1;
  string start_time = 2;      // ISO 8601 or "now"
  uint32 duration_minutes = 3;
  repeated string nodes = 4;
  repeated string accounts = 5;
  repeated string users = 6;
  repeated string flags = 7;
  string user = 8;            // requesting user; recorded as reservation owner
}

message UpdateReservationRequest {
  string name = 1;
  uint32 duration_minutes = 2;  // 0 = no change
  repeated string add_nodes = 3;
  repeated string remove_nodes = 4;
  repeated string add_users = 5;
  repeated string remove_users = 6;
  repeated string add_accounts = 7;
  repeated string remove_accounts = 8;
  string user = 9;              // requesting user; must be the owner (root and trusted internal callers always allowed; legacy reservations with no recorded owner are mutable by anyone)
}

message DeleteReservationRequest {
  string name = 1;
  string user = 2;             // requesting user; must be the owner (root and trusted internal callers always allowed; legacy reservations with no recorded owner are mutable by anyone)
}

message ListReservationsRequest { }

message ListReservationsResponse {
  repeated ReservationInfo reservations = 1;
}

message ReservationInfo {
  string name = 1;
  string start_time = 2;
  string end_time = 3;
  string nodes = 4;
  string accounts = 5;
  string users = 6;
  string flags = 7;
  string state = 8;
  string owner = 9;
}

// ============================================================
// Admission token management
// ============================================================

message CreateTokenRequest {
  optional uint32 ttl_secs = 1;    // Token lifetime in seconds (0 or absent = no expiry)
}

message CreateTokenResponse {
  string token = 1;      // Full <id>.<secret> token string (shown once)
  string token_id = 2;   // Short ID for reference in list/revoke
}

message ListTokensRequest {}

message ListTokensResponse {
  repeated TokenInfo tokens = 1;
}

message TokenInfo {
  string id = 1;
  string created_at = 2;       // RFC 3339
  string expires_at = 3;       // RFC 3339 or empty if no expiry
  bool revoked = 4;
}

message RevokeTokenRequest {
  string token_id = 1;
}

message RevokeTokenResponse {}
