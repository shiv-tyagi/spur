apiVersion: v1
kind: ConfigMap
metadata:
  name: spur-config
  namespace: spur
data:
  spur.conf: |
    cluster_name = "spur-k8s"

    [controller]
    # Raft peers use StatefulSet DNS names on the dedicated Raft port.
    # node_id is auto-derived from each pod's position in this peers list
    # (its hostname matched against each entry), so it never needs to be set.
    peers = [
      "spurctld-0.spurctld.spur.svc.cluster.local:6821",
      "spurctld-1.spurctld.spur.svc.cluster.local:6821",
      "spurctld-2.spurctld.spur.svc.cluster.local:6821",
    ]

    [scheduler]
    interval_secs = 2
    max_jobs_per_cycle = 100
    plugin = "backfill"

    [accounting]
    database_url = "postgresql://spur:spur@postgres.spur.svc.cluster.local/spur"

    [[partitions]]
    name = "default"
    state = "UP"
    default = true
    nodes = "ALL"
    max_time = "7d"
    default_time = "1h"
