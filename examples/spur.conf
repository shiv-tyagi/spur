cluster_name = "mi300x-cluster"

[controller]
listen_addr = "[::]:6817"
state_dir = "/var/spool/spur"
# Controller hostname(s). For an HA quorum, list every controller so clients
# and agents fail over to a surviving node if one is unreachable. Each host is
# combined with the port from listen_addr. Equivalent to a comma-separated
# SPUR_CONTROLLER_ADDR (e.g. "http://ctrl1:6817,http://ctrl2:6817").
# hosts = ["ctrl1", "ctrl2", "ctrl3"]

[scheduler]
plugin = "backfill"
interval_secs = 1
max_jobs_per_cycle = 10000
fairshare_halflife_days = 14

[accounting]
host = "localhost:6819"

[auth]
plugin = "none"

[[partitions]]
name = "gpu"
default = true
state = "UP"
nodes = "mi300,mi300-2"
max_time = "7-00:00:00"
default_time = "1:00:00"
min_nodes = 1
priority_tier = 1

# Partition membership can also use label selectors. A node matches if it
# satisfies the hostname pattern (nodes=) OR all key=value pairs in selector.
# Both can be specified — they form a union.
#
# [[partitions]]
# name = "inference"
# state = "UP"
# selector = { pool = "inference", gpu = "mi300x" }
# max_time = "1-00:00:00"

[[nodes]]
names = "mi300"
cpus = 256
memory_mb = 2321924
gres = ["gpu:mi300x:8"]

[[nodes]]
names = "mi300-2"
cpus = 256
memory_mb = 2321904
gres = ["gpu:mi300x:8"]

# Node configs can also match by label selector instead of hostname pattern.
# Features and weight from matching configs are applied at registration.
#
# [[nodes]]
# selector = { gpu = "mi300x" }
# features = ["mi300x", "rocm6"]
# weight = 10

[network]
wg_enabled = false
agent_port = 6818

[logging]
level = "info"
format = "text"
