cluster_name = "mi300x-cluster"

[controller]
listen_addr = "[::]:6817"
state_dir = "/var/spool/spur"
# Maximum automatic requeues before a job is held (default 5).
max_batch_requeue = 5
# Controller hostname(s). For an HA quorum, list every controller so clients
# and agents fail over to a surviving node if one is unreachable. Each host is
# combined with the port from listen_addr. Equivalent to a comma-separated
# SPUR_CONTROLLER_ADDR (e.g. "http://ctrl1:6817,http://ctrl2:6817").
# hosts = ["ctrl1", "ctrl2", "ctrl3"]

[scheduler]
plugin = "backfill"
interval_secs = 1
max_jobs_per_cycle = 10000
fairshare_halflife_days = 14

[accounting]
database_url = "postgresql://spur:spur@localhost/spur"
# Cluster-wide fallback QOS, applied when a job specifies no --qos and its
# association has no default QOS. Ensures a QOS (and its limits) always
# applies instead of running unenforced. Must name an existing QOS. Unset =
# no fallback.
# default_qos = "normal"
# Reject at submit any job that still has no QOS after the resolution chain
# (explicit --qos -> association default -> default_qos above). Mirrors
# Slurm's AccountingStorageEnforce=qos. Default false.
# require_qos = false

[auth]
plugin = "none"

[[partitions]]
name = "gpu"
default = true
state = "UP"
nodes = "mi300,mi300-2"
max_time = "7-00:00:00"
default_time = "1:00:00"
min_nodes = 1
priority_tier = 1

# Partition membership can also use label selectors. A node matches if it
# satisfies the hostname pattern (nodes=) OR all key=value pairs in selector.
# Both can be specified — they form a union.
#
# [[partitions]]
# name = "inference"
# state = "UP"
# selector = { pool = "inference", gpu = "mi300x" }
# max_time = "1-00:00:00"

# Restrict partition access by account (allow_accounts / deny_accounts).
#
# [[partitions]]
# name = "research"
# allow_accounts = ["research", "faculty"]
# deny_accounts = ["student"]

[[nodes]]
names = "mi300"
cpus = 256
memory_mb = 2321924
gres = ["gpu:mi300x:8"]

[[nodes]]
names = "mi300-2"
cpus = 256
memory_mb = 2321904
gres = ["gpu:mi300x:8"]

# Node configs can also match by label selector instead of hostname pattern.
# Features and weight from matching configs are applied at registration.
#
# [[nodes]]
# selector = { gpu = "mi300x" }
# features = ["mi300x", "rocm6"]
# weight = 10

[network]
wg_enabled = false
agent_port = 6818

[logging]
level = "info"
format = "text"

# Native cluster (k0s) that SPUR provisions and owns: `spur k8s up/down`, spurd-owned k0s
# systemd units, GPU CDI on join. Disabled by default. This is the INVERSE of [kubernetes]
# (which lets SPUR run inside an existing k8s and accept SpurJob CRDs).
[cluster]
enabled = false
distro = "k0s"                # only k0s is supported today
pod_cidr = "10.42.0.0/16"     # Calico bird carves per-node /24s from this over the mesh
service_cidr = "10.43.0.0/16"
# cni = "kuberouter"          # or "calico" (mesh-native bird routing over WireGuard)
cni_mtu = 1450                # Calico MTU; leaves headroom for WireGuard overhead on the mesh
# control_plane_node = "head-node"   # empty = pick from inventory
storage_provisioner = "local-path"          # ships a default StorageClass so PVCs bind; or "none"
# local_path_dir = "/mnt/scratch/local-path"  # point local-path at a big disk (default: /var/lib/...)
