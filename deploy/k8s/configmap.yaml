apiVersion: v1
kind: ConfigMap
metadata:
  name: spur-config
  namespace: spur
data:
  spur.conf: |
    cluster_name = "spur-k8s"

    [scheduler]
    interval_secs = 2
    max_jobs_per_cycle = 100
    plugin = "backfill"

    [accounting]
    enabled = true
    address = "spurdbd.spur.svc.cluster.local:6819"

    [[partitions]]
    name = "default"
    state = "UP"
    default = true
    nodes = "ALL"
    max_time = "7d"
    default_time = "1h"
